<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Xthy QRCode 產生器</title>
    <meta
      name="description"
      content="支援網址、Wi-Fi、文字、TWQR、電話、簡訊的 QRCode 產生、掃描、匯出工具。"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app-shell">
      <main class="workspace-grid">
        <section class="left-column-stack">
          <section class="panel intro-panel">
            <p class="eyebrow">Xthy Work Tools</p>
            <h1>Xthy QRCode 產生器</h1>
            <p class="subtitle">可建立、掃描、驗證並匯出多種 QRCode，支援手機操作。</p>
          </section>

          <details class="panel form-panel mobile-collapsible">
            <summary class="panel-summary">
              <span>內容設定</span>
              <span class="panel-summary__icon" aria-hidden="true">⌄</span>
            </summary>
            <div class="panel-body">
              <div class="field-group">
                <label for="codeType">QRCode 類型</label>
                <select id="codeType"></select>
              </div>

              <div id="dynamicFields" class="dynamic-fields"></div>

              <details class="scan-panel">
                <summary>掃描 / 匯入內容</summary>
                <div class="scan-actions">
                  <label class="upload-button">
                    上傳圖片掃描
                    <input id="scanImageInput" type="file" accept="image/*" hidden />
                  </label>
                  <button id="startCameraBtn" type="button">開啟鏡頭掃描</button>
                  <button id="stopCameraBtn" type="button" class="ghost-button" disabled>停止鏡頭</button>
                </div>
                <div id="cameraReader" class="camera-reader" hidden></div>
                <p id="scanStatus" class="hint">可上傳含 QRCode 的圖片，或使用相機即時掃描。</p>
              </details>
            </div>
          </details>
        </section>

        <details class="panel options-panel mobile-collapsible">
          <summary class="panel-summary">
            <span>QRCode 設定</span>
            <span class="panel-summary__icon" aria-hidden="true">⌄</span>
          </summary>
          <div class="panel-body">
            <div class="field-group compact-group">
              <label for="qrSize">尺寸 <span id="qrSizeValue">280px</span></label>
              <input id="qrSize" type="range" min="100" max="600" step="10" value="280" />
            </div>

            <div class="field-group compact-group">
              <label for="minVersion">Minimum Version <span id="minVersionValue">Auto</span></label>
              <input id="minVersion" type="range" min="0" max="40" step="1" value="0" />
            </div>

            <div class="field-group compact-group">
              <label for="errorCorrection">容錯率 (ECL)</label>
              <select id="errorCorrection">
                <option value="L">低 (7%)</option>
                <option value="M" selected>中 (15%)</option>
                <option value="Q">高 (25%)</option>
                <option value="H">超高 (30%)</option>
              </select>
            </div>

            <div class="field-group compact-group">
              <label for="dotStyle">點樣式</label>
              <select id="dotStyle">
                <option value="square">方形</option>
                <option value="rounded">圓角</option>
                <option value="dots">圓形</option>
              </select>
            </div>

            <div class="field-group compact-group">
              <label for="qrColor">QRCode 顏色</label>
              <input id="qrColor" type="color" value="#111827" />
            </div>

            <div class="field-group compact-group">
              <label for="backgroundColor">背景顏色</label>
              <input id="backgroundColor" type="color" value="#ffffff" />
            </div>

            <div class="field-group compact-group">
              <label for="backgroundAlpha">背景透明度 <span id="backgroundAlphaValue">100%</span></label>
              <input id="backgroundAlpha" type="range" min="0" max="100" step="1" value="100" />
            </div>

            <div class="field-group compact-group">
              <label for="borderSize">邊框大小 <span id="borderSizeValue">16px</span></label>
              <input id="borderSize" type="range" min="0" max="80" step="2" value="16" />
            </div>

            <div class="settings-divider"></div>

            <div class="panel-head panel-head--subsection">
              <h2>LOGO 設定</h2>
            </div>

            <div class="field-group compact-group">
              <label for="logoMode">LOGO 模式</label>
              <select id="logoMode">
                <option value="none">不放</option>
                <option value="text">文字</option>
                <option value="image">圖片</option>
              </select>
            </div>

            <div id="logoTextFields" class="mode-panel" hidden>
              <div class="field-group compact-group">
                <label for="logoText">文字內容</label>
                <input id="logoText" type="text" maxlength="20" placeholder="例如：Xthy" />
              </div>
              <div class="field-group compact-group">
                <label for="logoTextColor">文字顏色</label>
                <input id="logoTextColor" type="color" value="#111827" />
              </div>
              <div class="field-group compact-group">
                <label for="logoTextBgColor">背景顏色</label>
                <input id="logoTextBgColor" type="color" value="#ffffff" />
              </div>
              <div class="field-group compact-group">
                <label for="logoTextStyle">背景樣式</label>
                <select id="logoTextStyle">
                  <option value="box">方框</option>
                  <option value="bar">長條</option>
                  <option value="outline">字描邊</option>
                  <option value="none">無</option>
                </select>
              </div>
              <div class="field-group compact-group">
                <label for="logoFontFamily">字形</label>
                <select id="logoFontFamily">
                  <option value="Inter, Arial, sans-serif">Inter</option>
                  <option value="'Noto Sans TC', sans-serif">Noto Sans TC</option>
                  <option value="'Microsoft JhengHei', sans-serif">Microsoft JhengHei</option>
                  <option value="Georgia, serif">Georgia</option>
                  <option value="'Courier New', monospace">Courier New</option>
                </select>
              </div>
              <div class="field-group compact-group">
                <label for="logoTextSize">文字大小 <span id="logoTextSizeValue">32px</span></label>
                <input id="logoTextSize" type="range" min="16" max="96" step="1" value="32" />
              </div>
              <div class="field-group compact-group">
                <label for="logoTextPadding">背景寬度 / 描邊粗細 <span id="logoTextPaddingValue">12px</span></label>
                <input id="logoTextPadding" type="range" min="0" max="40" step="1" value="12" />
              </div>
            </div>

            <div id="logoImageFields" class="mode-panel" hidden>
              <div class="field-group compact-group">
                <label class="upload-button">
                  上傳圖片
                  <input id="logoImageInput" type="file" accept="image/*" hidden />
                </label>
                <p id="logoImageName" class="hint">尚未選擇圖片</p>
              </div>
              <div class="field-group compact-group">
                <label for="logoImageSize">圖片大小 <span id="logoImageSizeValue">64px</span></label>
                <input id="logoImageSize" type="range" min="24" max="180" step="2" value="64" />
              </div>
              <div class="field-group compact-group">
                <label for="logoImageBorder">圖片邊框 <span id="logoImageBorderValue">8px</span></label>
                <input id="logoImageBorder" type="range" min="0" max="30" step="1" value="8" />
              </div>
            </div>

          </div>
        </details>

        <section class="panel preview-panel">
          <div class="panel-head">
            <h2>即時預覽</h2>
            <div class="preview-head-controls">
              <div class="preview-bg-control">
                <label for="previewBgMode">預覽底色</label>
                <select id="previewBgMode">
                  <option value="light">白色</option>
                  <option value="dark">黑色</option>
                </select>
              </div>
              <p id="validationSummary" class="validation-summary">尚未輸入資料</p>
            </div>
          </div>

          <div class="preview-card">
            <div class="preview-stage">
              <div id="qrcodePreview" class="qrcode-preview"></div>
              <div id="logoPreviewOverlay" class="logo-preview-overlay"></div>
            </div>
          </div>

          <div class="export-controls">
            <div class="field-group">
              <label for="fileName">檔案名稱</label>
              <input id="fileName" type="text" value="xthy-qrcode" />
            </div>
            <div class="field-group">
              <label for="downloadFormat">儲存類型</label>
              <select id="downloadFormat">
                <option value="png">PNG</option>
                <option value="jpg">JPG</option>
                <option value="webp">WEBP</option>
                <option value="svg">SVG</option>
              </select>
            </div>
            <div id="riskBox" class="risk-box"></div>
            <div class="export-buttons">
              <button id="downloadBtn" type="button">儲存 QRCode</button>
              <div class="copy-action-group">
                <button id="copyBtn" type="button" class="ghost-button">複製圖片</button>
                <span id="copyStatus" class="copy-status" aria-live="polite"></span>
              </div>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/qr-code-styling@1.9.2/lib/qr-code-styling.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
