<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mermaid 即時預覽器</title>
  <meta name="description" content="左側輸入 Mermaid 程式碼，右側即時預覽對應圖形的靜態網頁工具。" />
  <link rel="icon" type="image/jpeg" href="./favicon.jpg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="bg-grid"></div>
  <div class="orb orb-a"></div>
  <div class="orb orb-b"></div>

  <main class="shell">
    <header class="topbar">
      <a class="back" href="/">← 回首頁</a>
      <span class="badge">MERMAID PREVIEW</span>
    </header>

    <section class="hero panel">
      <h1>Mermaid 即時預覽器</h1>
      <p class="subtitle">左側輸入 Mermaid 程式碼，右側立即渲染流程圖、時序圖、心智圖等圖形。純前端，適合直接放 GitHub Pages。</p>
      <div class="chips">
        <span>即時預覽</span>
        <span>錯誤提示</span>
        <span>PNG / SVG 匯出</span>
        <span>自訂主題顏色</span>
      </div>
    </section>

    <section class="workspace">
      <section class="panel editor-card">
        <div class="card-head">
          <h2>Mermaid 程式碼</h2>
          <div class="head-actions">
            <button class="mini-btn" id="demoBtn">貼入範例</button>
            <button class="mini-btn" id="copyBtn">複製程式碼</button>
          </div>
        </div>
        <textarea id="codeInput" spellcheck="false" placeholder="在這裡輸入 Mermaid，例如：
flowchart TD
  A[開始] --> B{有資料嗎？}
  B -->|有| C[渲染圖形]
  B -->|沒有| D[顯示提示]"></textarea>
        <div class="status-row">
          <span id="statusText">等待輸入</span>
          <span id="charCount">0 字元</span>
        </div>
      </section>

      <section class="panel preview-card">
        <div class="card-head">
          <h2>即時預覽</h2>
          <div class="head-actions">
            <button class="mini-btn" id="downloadSvgBtn">下載 SVG</button>
            <button class="mini-btn" id="downloadPngBtn">下載 PNG</button>
          </div>
        </div>

        <section class="theme-panel">
          <div class="theme-head">
            <h3>主題設定</h3>
            <label class="theme-mode-label">模式
              <select id="themeMode">
                <option value="dark">深色</option>
                <option value="default">淺色</option>
              </select>
            </label>
          </div>

          <div class="layout-grid">
            <label>布局引擎
              <select id="layoutEngine">
                <option value="dagre">標準 Dagre</option>
                <option value="elk">ELK Layered（自動排版）</option>
              </select>
            </label>
            <label>圖形方向
              <select id="graphDirection">
                <option value="auto">依程式碼</option>
                <option value="LR">左到右</option>
                <option value="TB">上到下</option>
                <option value="RL">右到左</option>
                <option value="BT">下到上</option>
              </select>
            </label>
          </div>

          <div class="color-settings">
            <label>物件填色
              <input type="color" id="primaryColor" value="#7c8cff" />
            </label>
            <label>線條色
              <input type="color" id="lineColor" value="#73e0ff" />
            </label>
            <label>文字色
              <input type="color" id="textColor" value="#e8f0ff" />
            </label>
            <label>背景色
              <input type="color" id="backgroundColor" value="#0b1220" />
            </label>

            <label class="toggle-row color-toggle">
              <input type="checkbox" id="shapeColorMode" checked />
              <span>
                <strong>依形狀自訂物件顏色</strong>
                <small>相同形狀會統一套用同一個顏色；關閉時回到 Mermaid 主色。</small>
              </span>
            </label>

            <label class="shape-color-control">矩形 / 方框
              <input type="color" id="rectShapeColor" value="#7c8cff" />
            </label>
            <label class="shape-color-control">圓角 / 膠囊
              <input type="color" id="roundedShapeColor" value="#8dd8ff" />
            </label>
            <label class="shape-color-control">圓形 / 橢圓
              <input type="color" id="circleShapeColor" value="#7ff0c7" />
            </label>
            <label class="shape-color-control">菱形 / 多邊形
              <input type="color" id="polygonShapeColor" value="#ffd166" />
            </label>
            <label class="shape-color-control">特殊形狀
              <input type="color" id="specialShapeColor" value="#c7a4ff" />
            </label>
            <label class="shape-color-control">Class / State 區塊
              <input type="color" id="classShapeColor" value="#ffb4c8" />
            </label>
          </div>

          <div class="theme-actions">
            <button class="mini-btn" id="applyThemeBtn">套用主題</button>
            <button class="mini-btn" id="resetThemeBtn">重設主題</button>
          </div>
        </section>

        <div id="errorBox" class="error-box" hidden></div>
        <div id="preview" class="preview-area">
          <div class="empty-state">圖會顯示在這裡</div>
        </div>
      </section>
    </section>
  </main>

  <script type="module" src="./script.js"></script>
</body>
</html>
