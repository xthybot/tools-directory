<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Markdown 簡報</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <header class="header">
      <div>
        <h1>Markdown 簡報</h1>
        <p>貼上 Markdown，用 <code>---</code> 分隔投影片，可預覽、播放與匯出 PDF。</p>
      </div>
      <div class="header-actions">
        <button id="modeSwitch" class="switch-btn" type="button" role="switch" aria-checked="false">預覽：關閉</button>
        <button id="playBtn" class="primary">播放</button>
        <button id="exportBtn">匯出 PDF</button>
      </div>
    </header>

    <section class="workspace single-column">
      <section class="editor-panel">
        <div class="toolbar" aria-label="Markdown 快速樣式">
          <button data-style="h1">#</button>
          <button data-style="h2">##</button>
          <button data-style="h3">###</button>
          <button data-style="ul">-</button>
          <button data-style="ol1">1.</button>
          <button data-style="ol2">a.</button>
          <button data-style="ol3">i.</button>
          <button data-style="table">表格</button>
        </div>

        <textarea id="markdownInput" spellcheck="false"></textarea>
        <div id="markdownPreview" class="markdown-preview hidden" contenteditable="true"></div>
      </section>
    </section>
  </main>

  <section id="presentation" class="presentation hidden" aria-hidden="true">
    <button id="closePresentation" class="close-btn">×</button>
    <div id="presentationSlide" class="presentation-slide"></div>
    <div id="presentationCounter" class="presentation-counter"></div>
    <div id="presentationControls" class="presentation-controls visible">
      <button id="fullscreenBtn" class="fullscreen-btn" title="切換全螢幕">⛶</button>
    </div>
  </section>

  <section id="printSlides" class="print-slides hidden" aria-hidden="true"></section>

  <script src="app.js"></script>
</body>
</html>
